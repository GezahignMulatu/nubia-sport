<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nubia Sport</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🏃 Nubia Sport</h1>
    <p>Track your daily workouts</p>
  </header>

  <main>
    <div class="form">
      <input type="text" id="activity" placeholder="Workout (e.g. Running)">
      <input type="number" id="duration" placeholder="Minutes">
      <button onclick="addWorkout()">Add Workout</button>
    </div>

    <ul id="workoutList"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
